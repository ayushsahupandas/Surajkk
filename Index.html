<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suraj Kirana Store Ghuwara | Trusted Kirana Store</title>
  <meta
    name="description"
    content="Suraj Kirana Store Ghuwara - Trusted local kirana store for groceries, daily essentials, snacks, beverages, and household products."
  />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <style>
    :root {
      --green: #1a6b3c;
      --green-dark: #14532d;
      --saffron: #f5a623;
      --yellow: #ffd700;
      --white: #ffffff;
      --charcoal: #1a1a2e;
      --text: #4a4a57;
      --bg: #fffdf8;
      --border: rgba(26, 26, 46, 0.08);
      --shadow-sm: 0 10px 30px rgba(26, 26, 46, 0.08);
      --shadow-md: 0 18px 45px rgba(26, 26, 46, 0.12);
      --shadow-lg: 0 24px 60px rgba(26, 26, 46, 0.18);
      --radius: 18px;
      --radius-lg: 28px;
      --container: 1180px;
      --transition: 0.35s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 90px;
    }

    body {
      font-family: "Inter", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(255, 215, 0, 0.14), transparent 22%),
        radial-gradient(circle at left center, rgba(26, 107, 60, 0.08), transparent 25%),
        var(--bg);
      line-height: 1.65;
    }

    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }
    button, input, textarea { font: inherit; }

    .container {
      width: min(var(--container), calc(100% - 2rem));
      margin: 0 auto;
    }

    .section {
      padding: 100px 0;
      position: relative;
    }

    .section-heading {
      max-width: 760px;
      margin: 0 auto 52px;
      text-align: center;
    }

    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(245, 166, 35, 0.14);
      color: var(--green);
      border: 1px solid rgba(245, 166, 35, 0.24);
      padding: 0.65rem 1rem;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .section-heading h2 {
      margin-bottom: 1rem;
      color: var(--charcoal);
      font-family: "Poppins", sans-serif;
      font-size: clamp(2rem, 3vw, 3rem);
      line-height: 1.2;
    }

    .section-heading p {
      font-size: 1.02rem;
      color: var(--text);
    }

    h1, h2, h3, h4, h5 {
      font-family: "Poppins", sans-serif;
      color: var(--charcoal);
    }

    .page-progress {
      position: fixed;
      inset: 0 auto auto 0;
      height: 4px;
      width: 0;
      z-index: 9999;
      background: linear-gradient(90deg, var(--saffron), var(--green));
      box-shadow: 0 4px 16px rgba(245, 166, 35, 0.45);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      border: 0;
      cursor: pointer;
      border-radius: 999px;
      padding: 0.95rem 1.4rem;
      font-weight: 700;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition), color var(--transition);
    }

    .btn:hover { transform: translateY(-2px); }

    .btn-primary {
      background: linear-gradient(135deg, var(--green), #21834b);
      color: var(--white);
      box-shadow: 0 12px 25px rgba(26, 107, 60, 0.22);
    }

    .btn-outline {
      background: rgba(255, 255, 255, 0.75);
      color: var(--charcoal);
      border: 1px solid rgba(26, 26, 46, 0.12);
      backdrop-filter: blur(10px);
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255, 253, 248, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(26, 26, 46, 0.06);
    }

    .navbar {
      min-height: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.9rem;
      flex-shrink: 0;
    }

    .logo-mark {
      width: 50px;
      height: 50px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--saffron), var(--yellow));
      color: var(--charcoal);
      box-shadow: var(--shadow-sm);
      font-size: 1.2rem;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    .logo-text strong { color: var(--charcoal); font-size: 1rem; }
    .logo-text small { color: var(--green); font-weight: 700; }

    .nav-menu {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 0.35rem;
    }

    .nav-link {
      display: inline-flex;
      padding: 0.8rem 1rem;
      border-radius: 999px;
      color: var(--charcoal);
      font-weight: 600;
      transition: 0.3s;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--green);
      background: rgba(26, 107, 60, 0.08);
    }

    .nav-toggle {
      display: none;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      border: 1px solid rgba(26, 26, 46, 0.08);
      background: var(--white);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
    }

    .nav-toggle span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--charcoal);
      margin: 5px auto;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 88px 0 78px;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(130deg, rgba(245, 166, 35, 0.15) 0 38%, rgba(26, 107, 60, 0.12) 38% 100%);
      z-index: -2;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 2.5rem;
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(26, 26, 46, 0.08);
      border-radius: 999px;
      padding: 0.75rem 1rem;
      font-weight: 700;
      color: var(--green);
      box-shadow: var(--shadow-sm);
    }

    .hero-content h1 {
      margin: 1.2rem 0 1rem;
      font-size: clamp(2.4rem, 5vw, 4.2rem);
      line-height: 1.1;
    }

    .hero-content h1 span { color: var(--green); }

    .hero-content p {
      max-width: 620px;
      font-size: 1.08rem;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 1.8rem 0;
    }

    .hero-highlights {
      display: flex;
      flex-wrap: wrap;
      gap: 0.85rem;
      margin-top: 1rem;
    }

    .highlight-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.8rem 1rem;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(26, 26, 46, 0.08);
      border-radius: 999px;
      box-shadow: var(--shadow-sm);
      font-weight: 600;
      color: var(--charcoal);
    }

    .hero-card {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(16px);
      padding: 1.3rem;
    }

    .shop-display {
      min-height: 420px;
      border-radius: 26px;
      overflow: hidden;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(255, 215, 0, 0.2), transparent 28%),
        linear-gradient(145deg, #ffffff, #fff6e7 45%, #eef9f1);
      border: 1px solid rgba(26, 26, 46, 0.06);
      position: relative;
    }

    .basket {
      width: 210px;
      height: 210px;
      border-radius: 40px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--saffron), var(--yellow));
      box-shadow: 0 28px 50px rgba(245, 166, 35, 0.28);
      transform: rotate(-6deg);
      font-size: 5rem;
    }

    .shop-badge {
      position: absolute;
      padding: 0.7rem 0.95rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow-sm);
      font-weight: 700;
      color: var(--charcoal);
      border: 1px solid rgba(26, 26, 46, 0.06);
      animation: floatY 4s ease-in-out infinite;
    }

    .badge-1 { top: 22px; left: 18px; }
    .badge-2 { top: 95px; right: 20px; animation-delay: 0.6s; }
    .badge-3 { bottom: 95px; left: 24px; animation-delay: 1.1s; }
    .badge-4 { bottom: 28px; right: 28px; animation-delay: 1.5s; }

    .stats-strip { padding: 0 0 30px; }

    .stats-grid,
    .category-grid,
    .product-grid,
    .services-grid,
    .offers-grid,
    .why-grid,
    .gallery-grid,
    .testimonial-grid,
    .footer-grid {
      display: grid;
      gap: 1.2rem;
    }

    .stats-grid { grid-template-columns: repeat(4, 1fr); }
    .category-grid { grid-template-columns: repeat(3, 1fr); }
    .product-grid { grid-template-columns: repeat(4, 1fr); }
    .services-grid { grid-template-columns: repeat(3, 1fr); }
    .offers-grid { grid-template-columns: repeat(3, 1fr); }
    .why-grid { grid-template-columns: repeat(4, 1fr); }
    .gallery-grid { grid-template-columns: repeat(3, 1fr); }
    .testimonial-grid { grid-template-columns: repeat(3, 1fr); }
    .footer-grid { grid-template-columns: 1.2fr 0.8fr 0.9fr 0.8fr; }

    .stats-box,
    .category-card,
    .product-card,
    .service-card,
    .why-card,
    .testimonial-card,
    .feature-card,
    .offer-card,
    .contact-card,
    .contact-form-wrap,
    .point-card {
      background: var(--white);
      border-radius: 24px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 1.5rem;
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .stats-box:hover,
    .category-card:hover,
    .product-card:hover,
    .service-card:hover,
    .why-card:hover,
    .testimonial-card:hover,
    .feature-card:hover,
    .offer-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-md);
    }

    .stats-box {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .stats-box i,
    .category-icon,
    .service-card i,
    .why-card i,
    .point-card i,
    .feature-card i,
    .contact-item i {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(245, 166, 35, 0.18), rgba(26, 107, 60, 0.14));
      color: var(--green);
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    .stats-box h3 { font-size: 1.45rem; }
    .stats-box p { font-size: 0.95rem; }

    .about-grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 2rem;
      align-items: start;
    }

    .about-points,
    .about-features {
      display: grid;
      gap: 1rem;
    }

    .about-features {
      grid-template-columns: repeat(2, 1fr);
    }

    .point-card {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
    }

    .category-icon,
    .service-card i,
    .why-card i,
    .feature-card i {
      margin-bottom: 1rem;
    }

    .price-tag,
    .stock-badge,
    .offer-badge {
      display: inline-block;
      padding: 0.6rem 0.9rem;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .price-tag {
      margin-top: 0.9rem;
      background: rgba(245, 166, 35, 0.14);
      color: #9a5d00;
    }

    .product-card { position: relative; }
    .product-thumb {
      height: 110px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(255, 215, 0, 0.22), transparent 30%),
        linear-gradient(135deg, rgba(245, 166, 35, 0.18), rgba(26, 107, 60, 0.1));
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .stock-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(26, 107, 60, 0.12);
      color: var(--green);
      font-size: 0.82rem;
    }

    .product-footer {
      margin-top: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
    }

    .small-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.7rem 1rem;
      border-radius: 999px;
      background: rgba(26, 107, 60, 0.1);
      color: var(--green);
      font-weight: 700;
      transition: var(--transition);
    }

    .small-btn:hover {
      background: var(--green);
      color: var(--white);
    }

    .offer-card {
      position: relative;
      overflow: hidden;
      padding: 2rem;
      border-radius: 28px;
      background: linear-gradient(180deg, #fff8eb, #ffffff);
      border: 1px solid rgba(245, 166, 35, 0.18);
    }

    .offer-card::before {
      content: "";
      position: absolute;
      width: 160px;
      height: 160px;
      border-radius: 999px;
      top: -70px;
      right: -60px;
      background: rgba(245, 166, 35, 0.12);
    }

    .featured-offer {
      background: linear-gradient(135deg, var(--green), #23864d);
      color: rgba(255, 255, 255, 0.92);
    }

    .featured-offer h3,
    .featured-offer .offer-link {
      color: var(--white);
    }

    .offer-badge {
      margin-bottom: 1rem;
      background: rgba(255, 255, 255, 0.65);
      color: #a45f00;
    }

    .offer-link {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      font-weight: 700;
      margin-top: 1rem;
      color: var(--green);
    }

    .gallery-item {
      min-height: 240px;
      border-radius: 26px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(145deg, rgba(245, 166, 35, 0.22), rgba(26, 107, 60, 0.16)),
        linear-gradient(135deg, #fff8e8, #eef8f1);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      transition: 0.3s;
    }

    .gallery-item:hover {
      transform: scale(1.02);
      box-shadow: var(--shadow-md);
    }

    .gallery-item span {
      padding: 0.9rem 1.2rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      font-weight: 700;
      color: var(--charcoal);
      box-shadow: var(--shadow-sm);
    }

    .stars {
      color: #f4b400;
      letter-spacing: 0.12em;
      margin-bottom: 1rem;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 1.5rem;
      align-items: start;
    }

    .contact-item {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      padding: 1rem 0;
      border-bottom: 1px dashed rgba(26, 26, 46, 0.08);
    }

    .map-placeholder {
      margin-top: 1rem;
      min-height: 220px;
      border-radius: 26px;
      display: grid;
      place-items: center;
      text-align: center;
      background:
        linear-gradient(145deg, rgba(245, 166, 35, 0.18), rgba(26, 107, 60, 0.12)),
        #fff;
      border: 1px dashed rgba(26, 26, 46, 0.12);
      color: var(--charcoal);
      padding: 1.5rem;
    }

    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: inline-block;
      margin-bottom: 0.45rem;
      font-weight: 700;
      color: var(--charcoal);
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      border: 1px solid rgba(26, 26, 46, 0.12);
      border-radius: 16px;
      padding: 0.95rem 1rem;
      background: #fffefc;
      outline: none;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: rgba(26, 107, 60, 0.45);
      box-shadow: 0 0 0 4px rgba(26, 107, 60, 0.08);
    }

    .error-text {
      display: block;
      min-height: 18px;
      color: #c0392b;
      font-size: 0.88rem;
      margin-top: 0.35rem;
    }

    .form-status {
      margin-top: 1rem;
      font-weight: 600;
      min-height: 24px;
    }

    .honeypot-field {
      position: absolute !important;
      left: -9999px !important;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }

    .site-footer {
      background: var(--charcoal);
      color: rgba(255, 255, 255, 0.82);
      margin-top: 40px;
    }

    .footer-grid {
      padding: 70px 0 30px;
    }

    .footer-col h4 {
      color: var(--white);
      margin-bottom: 1rem;
    }

    .footer-col ul { list-style: none; }
    .footer-col li { margin-bottom: 0.75rem; }

    .footer-brand {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
    }

    .social-links {
      display: flex;
      gap: 0.8rem;
    }

    .social-links a {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.08);
      transition: var(--transition);
    }

    .social-links a:hover {
      background: var(--green);
      color: var(--white);
      transform: translateY(-2px);
    }

    .footer-bottom {
      text-align: center;
      padding: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .floating-whatsapp,
    .back-to-top {
      position: fixed;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      border: none;
      box-shadow: var(--shadow-md);
      z-index: 999;
      transition: transform var(--transition), opacity var(--transition), visibility var(--transition);
    }

    .floating-whatsapp {
      bottom: 90px;
      background: #25d366;
      color: var(--white);
      font-size: 1.45rem;
    }

    .back-to-top {
      bottom: 22px;
      background: var(--charcoal);
      color: var(--white);
      cursor: pointer;
      opacity: 0;
      visibility: hidden;
    }

    .back-to-top.show {
      opacity: 1;
      visibility: visible;
    }

    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes floatY {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    @media (max-width: 1100px) {
      .hero-grid,
      .about-grid,
      .contact-grid {
        grid-template-columns: 1fr;
      }

      .stats-grid,
      .why-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .category-grid,
      .services-grid,
      .offers-grid,
      .testimonial-grid,
      .footer-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .product-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 860px) {
      .section { padding: 80px 0; }

      .nav-toggle { display: inline-block; }

      .nav-menu {
        position: absolute;
        top: calc(100% + 12px);
        left: 1rem;
        right: 1rem;
        background: rgba(255, 255, 255, 0.98);
        border: 1px solid rgba(26, 26, 46, 0.08);
        border-radius: 24px;
        box-shadow: var(--shadow-lg);
        padding: 1rem;
        flex-direction: column;
        align-items: stretch;
        opacity: 0;
        visibility: hidden;
        transform: translateY(-8px);
        transition: var(--transition);
      }

      .nav-menu.open {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
